{% extends 'base.html' %}
{% block title %}Загрузка файла{% endblock title %}
{% block content %}
  <div class="text-white">
    <h1>Загруженные файлы</h1>
    <ul>
        {% for file in files %}
        <li>
            <a href="{{ file.file.url }}" target="_blank">{{ file.title }}</a>
            (загружен {{ file.uploaded_at }})
        </li>
        {% endfor %}
    </ul>
    <a href="{% url 'pages:upload_file' %}">Загрузить новый файл</a>
  </div>
{% endblock content %}
