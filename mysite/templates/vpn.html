{% extends 'base.html' %}
{% block title %}VPN{% endblock title %}
{% block content %}
  <h1 class="mb-4">Работа с пользователями</h1>
  <div class="card">
    <div class="card-header">
      <h1>WireGuard VPN</h1>
    </div>
    <div class="card-body">
      <form method="post" action="{% url 'vpn:create_vpn_user' %}">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Имя пользователя" />
        <button type="submit">Создать VPN-пользователя</button>
      </form>
      <div id="status" class="status"></div>
    </div>
  </div>
    <h2 class="white">Пользователи</h2>
      <div class="row g-4">
        <div class="col-12 col-sm-6 col-lg-4">
        {% for user in users %}
          <div class="card">
            <div class="card-body">
              <p>Имя: {{ user.username }}</p>
              <p>IP адрес: {{ user.ip }}</p>
              <a href="{% url 'vpn:download_config' username=user.username %}" class="btn btn-primary">Скачать конфиг</a>
              <a href="{% url 'vpn:download_qr' username=user.username %}" class="btn btn-primary">Скачать qr</a>
            </div>
          </div>
        {% endfor %}

        </div>
        </div>
<script>
  function getCookie(name) {
    let cookieValue = null;

    if (document.cookie && document.cookie !== "") {
      const cookies = document.cookie.split(";");

      for (let cookie of cookies) {
        cookie = cookie.trim();

        if (cookie.startsWith(name + "=")) {
          cookieValue = decodeURIComponent(cookie.substring(name.length + 1));

          break;
        }
      }
    }

    return cookieValue;
  }

  const csrftoken = getCookie("csrftoken");

  function showMessage(message, type) {
    const status = document.getElementById("status");

    status.style.display = "block";
    status.className = "status " + type;
    status.innerText = message;

    setTimeout(() => {
      status.style.display = "none";
    }, 5000);
  }

  async function loadUsers() {
    const response = await fetch("/api/list/");
    const users = await response.json();

    const table = document.getElementById("usersTable");

    table.innerHTML = "";

    users.forEach((user) => {
      table.innerHTML += `
          <tr>
              <td>${user.username}</td>
              <td>${user.ip}</td>

              <td>

                  <div class="actions">

                      <a
                          href="/download/${user.username}/">

                          <button class="btn-success">
                              Скачать
                          </button>

                      </a>

                      <button
                          class="btn-primary"
                          onclick="showQr('${user.username}')">

                          QR
                      </button>

                      <button
                          class="btn-danger"
                          onclick="deleteUser('${user.username}')">

                          Удалить
                      </button>

                  </div>

              </td>

          </tr>
      `;
    });
  }

  async function createUser() {
    const username = document.getElementById("username").value;

    if (!username) {
      showMessage("Введите имя пользователя", "error");

      return;
    }

    const formData = new FormData();

    formData.append("username", username);

    {% comment %} const response = await fetch("/api/create/", {
      method: "POST",
      headers: {
        "X-CSRFToken": csrftoken,
      },
      body: formData,
    }); {% endcomment %}

    const result = await response.json();

    if (result.success) {
      showMessage("Пользователь создан", "success");

      document.getElementById("username").value = "";

      loadUsers();

      if (result.qr_file) {
        document.getElementById("qrImage").src = result.qr_file;

        document.getElementById("qrModal").style.display = "block";
      }
    } else {
      showMessage(result.error, "error");
    }
  }

  async function deleteUser(username) {
    if (!confirm(`Удалить пользователя ${username}?`)) {
      return;
    }

    const formData = new FormData();

    formData.append("username", username);

    const response = await fetch("/api/delete/", {
      method: "POST",
      headers: {
        "X-CSRFToken": csrftoken,
      },
      body: formData,
    });

    const result = await response.json();

    if (result.success) {
      showMessage("Пользователь удалён", "success");

      loadUsers();
    } else {
      showMessage("Ошибка удаления", "error");
    }
  }

  function showQr(username) {
    document.getElementById("qrImage").src =
      `/media/wireguard/${username}.png`;

    document.getElementById("qrModal").style.display = "block";
  }

  function closeQr() {
    document.getElementById("qrModal").style.display = "none";
  }

  loadUsers();
</script>

{% endblock content %}
